name: Soundness invariants

# Enforces SIV.md §8 (C9a, C9b) on every push and every PR. Failure fails
# the build; there is no soundness bypass (§16 Phase 4 ground rules).

on:
  push:
    branches: [main, v2-from-clean]
  pull_request:

jobs:
  invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic openai nltk spacy pytest
          python -m spacy download en_core_web_sm

      - name: Install Vampire
        run: |
          python -c "from siv.vampire_interface import setup_vampire; setup_vampire('.')"
          ls -la vampire

      - name: Run soundness invariant gate
        env:
          VAMPIRE_PATH: ${{ github.workspace }}/vampire
        run: |
          pytest tests/test_soundness_invariants.py -v \
            --tb=short \
            --strict-markers
